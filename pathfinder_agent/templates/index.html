<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PathFinder AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter', sans-serif; background: #1a1a1a; color: #e0e0e0; height: 100vh; display: flex; flex-direction: column; }
  .header { background: #1a1a1a; padding: 14px 20px; text-align: center; border-bottom: 1px solid #2f2f2f; }
  .header h1 { color: #e0e0e0; font-size: 20px; font-weight: 600; }
  .header p { color: #666; font-size: 11px; margin-top: 3px; }
  .lang-btn { background: #2f2f2f; color: #aaa; border: none; padding: 5px 12px; border-radius: 12px; cursor: pointer; font-size: 11px; margin: 6px 3px 0; }
  .lang-btn:hover { background: #3a3a3a; color: #fff; }
  .chat-box { flex: 1; overflow-y: auto; padding: 24px 20px; display: flex; flex-direction: column; gap: 16px; max-width: 760px; width: 100%; margin: 0 auto; }
  .message { max-width: 88%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.75; white-space: pre-wrap; }
  .bot { background: #2f2f2f; color: #e0e0e0; align-self: flex-start; border-bottom-left-radius: 4px; }
  .user { background: #3d3d3d; color: #fff; align-self: flex-end; border-bottom-right-radius: 4px; }
  .typing { text-align: center; color: #555; font-size: 12px; padding: 4px; height: 20px; }
  .input-area { padding: 16px 20px 24px; background: #1a1a1a; border-top: 1px solid #2f2f2f; display: flex; gap: 10px; max-width: 760px; width: 100%; margin: 0 auto; align-items: center; }
  input { flex: 1; padding: 14px 18px; border-radius: 25px; border: 1px solid #3a3a3a; background: #2f2f2f; color: #e0e0e0; font-size: 14px; outline: none; font-family: 'Inter', sans-serif; }
  input:focus { border-color: #555; }
  input::placeholder { color: #555; }
  button { background: #e0e0e0; color: #1a1a1a; border: none; padding: 12px 22px; border-radius: 25px; cursor: pointer; font-size: 14px; font-weight: 600; }
  button:hover { background: #fff; }
  .badge { display: inline-block; background: #2f2f2f; color: #888; font-size: 10px; padding: 2px 8px; border-radius: 10px; margin-bottom: 6px; }
</style>
</head>
<body>
<div class="header">
  <h1>🧭 PathFinder AI</h1>
  <p>Career & Life Guidance · గ్రామీణ యువత కోసం కెరీర్ మార్గదర్శి</p>
  <div>
    <button class="lang-btn" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('te')">తెలుగు</button>
  </div>
</div>
<div class="chat-box" id="chatBox"></div>
<div class="typing" id="typing"></div>
<div class="input-area">
  <input type="text" id="userInput" placeholder="Type your message..." onkeypress="handleKey(event)" />
  <button onclick="sendMessage()">Send</button>
</div>
<script>
  const sessionId = Math.random().toString(36).substr(2, 9);
  let isWaiting = false;

  function setLang(lang) {
    document.getElementById('userInput').placeholder = lang === 'te' ? 'మీ సందేశం టైప్ చేయండి...' : 'Type your message...';
    if (lang === 'te') {
        sendSilent('From now on, respond ONLY in Telugu language for the rest of this conversation.');
    } else {
        sendSilent('From now on, respond ONLY in English language for the rest of this conversation.');
    }
}

  window.onload = () => sendSilent('Hello, start the conversation');

  function sendSilent(msg) {
    setWaiting(true);
    fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg, session_id: sessionId})
    })
    .then(r => r.json())
    .then(data => { addMessage(data.response, 'bot'); setWaiting(false); })
    .catch(() => setWaiting(false));
  }

  function handleKey(e) { if (e.key === 'Enter' && !isWaiting) sendMessage(); }

  function setWaiting(val) {
    isWaiting = val;
    document.getElementById('typing').textContent = val ? 'PathFinder AI is thinking...' : '';
    document.getElementById('userInput').disabled = val;
  }

  function sendMessage() {
    if (isWaiting) return;
    const input = document.getElementById('userInput');
    const msg = input.value.trim();
    if (!msg) return;
    addMessage(msg, 'user');
    input.value = '';
    setWaiting(true);
    fetch('/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg, session_id: sessionId})
    })
    .then(r => r.json())
    .then(data => { addMessage(data.response, 'bot'); setWaiting(false); })
    .catch(() => { addMessage('Something went wrong. Please try again.', 'bot'); setWaiting(false); });
  }

  function addMessage(text, sender) {
    const box = document.getElementById('chatBox');
    const div = document.createElement('div');
    div.className = 'message ' + sender;
    div.innerHTML = text
      .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
      .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
      .replace(/\n/g, '<br>');
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }
</script>
</body>
</html>
